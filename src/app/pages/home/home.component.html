<!-- step -->
<div class="banner">
  <div class="content">
    <h1 class="mb-5">
      Des plats frais <br />
      pour vous.
    </h1>
    <a routerLink="menu"
      >Commandez maintenant ! <i class="bi bi-arrow-right"></i
    ></a>
  </div>
</div>
<div class="container mt-5 mb-5">
  <h1 class="text-center">
    Comment avoir <span class="highlight">des plats frais</span>
  </h1>
  <div class="row mt-5">
    <!-- one -->
    <div class="col-lg-4 mt-2">
      <div class="stepBox">
        <h1>1</h1>
        <p>choisissez vos aliments</p>
      </div>
    </div>
    <!-- two -->
    <div class="col-lg-4 mt-2">
      <div class="stepBox">
        <h1>2</h1>
        <p>remplir les détails</p>
      </div>
    </div>
    <!-- three -->
    <div class="col-lg-4 mt-2">
      <div class="stepBox">
        <h1>3</h1>
        <p>votre commande est livrée en quelques minutes</p>
      </div>
    </div>
  </div>
</div>
<!-- foodBox -->
<div class="container mt-4 mb-4">
  <h1 class="text-center">
    <span class="highlight">Les plats préférés </span>des clients
  </h1>
  <div class="row">
    <div class="col-lg-3 mt-3" *ngFor="let fd of foodData; index as i">
      <div class="foodBox" *ngIf="i <= 3">
        <img src="{{ fd.foodImg }}" />
        <h1>{{ fd.foodName }}</h1>
        <p>{{ fd.foodPrice }}</p>
      </div>
    </div>
  </div>
  <a routerLink="menu" class="viewmorebtn">Voir plus <i class="bi bi-arrow-right"></i></a>
</div>
