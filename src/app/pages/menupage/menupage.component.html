<div class="container mt-5 mb-5">
  <div class="row">
    <div class="col-lg-6" *ngIf="menuData">
      <a routerLink="../../menu" class="btn btn-dark btn-sm mb-3">Retour</a>
      <img src="{{ menuData[0].foodImg }}" width="100%" />
      <h1 class="mt-3">{{ menuData[0].foodName }}</h1>
      <p>{{ menuData[0].foodDetails }}</p>
      <p>{{ menuData[0].foodPrice }}</p>
      <br />
    </div>

    <div class="col-lg-6">
      <form action="">
        <h1>Entrer vos coordonnés !</h1>
        <input
          type="text"
          class="form-control"
          placeholder="Entrer votre nom complet !"
        />
        <input
          type="text"
          class="form-control"
          placeholder="Entrer votre numèro de téléphone !"
        />
        <textarea
          name=""
          id=""
          class="form-control"
          placeholder="Entrer votre adresse !"
        ></textarea>
        <button class="btn btn-dark btn-md mt-3">Commander !</button>
      </form>
    </div>
  </div>
</div>
